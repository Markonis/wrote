<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrote - Block Based WYSIWYG Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="src/wrote-styles.css">

  <style>
    #editor {
      min-height: 200px;
      border-radius: 0.5rem;
      border: 1px solid lightgray;
    }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script type="module">
    import { WroteEditor } from './src/wrote-editor.js';
    import { STYLES } from './src/block/wrote-block-style.js';

    document.addEventListener('DOMContentLoaded', () => {
      const editorElement = document.getElementById('editor');

      const actionProvider = (block) => [
        { label: 'Heading 1', callback: () => block.setStyle(STYLES.H1) },
        { label: 'Heading 2', callback: () => block.setStyle(STYLES.H2) },
        { label: 'Heading 3', callback: () => block.setStyle(STYLES.H3) },
        { label: 'Code', callback: () => block.setStyle(STYLES.CODE) },
        { label: 'Body', callback: () => block.setStyle(STYLES.BODY) },
        { label: 'Insert Badge', callback: () => block.insertHtmlAtCaret('<span contenteditable="false" class="badge bg-primary">Badge</span> ') },
        { label: 'Insert Button', callback: () => block.insertHtmlAtCaret('<button contenteditable="false" class="btn btn-sm btn-outline-primary">Click me</button> ') }
      ];

      new WroteEditor(editorElement, { actionProvider });
    });
  </script>
</body>
</html>
