<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrote - Block Based WYSIWYG Editor</title>
  
  <style>
    #editor {
      height: 200px;
      border-radius: 0.5rem;
      border: 1px solid lightgray;
    }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script type="module">
    import { WroteEditor } from './src/wrote-editor.js';
    
    document.addEventListener('DOMContentLoaded', () => {
      const editorElement = document.getElementById('editor');
      new WroteEditor(editorElement);
    });
  </script>
</body>
</html>
